<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Music Player</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <!-- Optional DaisyUI compiled CSS (light add-on) -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/daisyui@2.51.6/dist/full.css"
    />
    <!-- style.css -->
    <link rel="stylesheet" href="styles.css" />
    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0b0f12" />
    <!-- jsmediatags for parsing uploaded file metadata -->
    <script src="https://cdn.jsdelivr.net/npm/jsmediatags@3.9.5/dist/jsmediatags.min.js"></script>
  </head>
  <body class="bg-[#0b0f12] text-gray-200 font-montserrat">
    <header class="p-4">
      <h1 class="text-2xl font-bold text-green-400">
        Music Player — Spotify Style
      </h1>
    </header>

    <main
      class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6 min-h-screen flex items-center"
      style="align-items: stretch"
    >
      <!-- Player Card -->
      <section
        class="md:col-span-2 player-card bg-gradient-to-br from-[#081018]/60 to-[#0f1519]/60 rounded-2xl p-6 backdrop-blur-md border border-gray-800 shadow-lg glass-card"
      >
        <div class="flex flex-col md:flex-row items-center gap-6">
          <!-- Album Art -->
          <div
            id="coverContainer"
            class="cover-container w-56 h-56 rounded-xl overflow-hidden flex-shrink-0 mx-auto md:mx-0 relative"
          >
            <img
              id="cover"
              src="Cover/Alan Walker - Darkside.jpg"
              alt="cover"
              class="w-full h-full object-cover rounded-xl transition-transform duration-700"
            />
            <!-- Circular visualizer canvas that sits above/beside the cover -->
            <canvas
              id="coverVisualizer"
              class="absolute inset-0 w-full h-full pointer-events-none"
            ></canvas>
            <!-- Skeleton overlay while loading -->
            <div class="skeleton-overlay absolute inset-0"></div>
            <!-- EQ controls: placed in-flow under the cover image for a stable layout -->
            <div id="eqOverlay" class="eq-overlay">
              <div class="w-full max-w-xs">
                <div class="grid grid-cols-3 gap-2 items-center w-full">
                  <div class="text-center">
                    <label for="eqBass" class="text-xs text-gray-400"
                      >Bass</label
                    >
                    <input
                      id="eqBass"
                      type="range"
                      min="-12"
                      max="12"
                      value="0"
                      step="0.5"
                      class="w-full"
                    />
                  </div>
                  <div class="text-center">
                    <label for="eqMid" class="text-xs text-gray-400">Mid</label>
                    <input
                      id="eqMid"
                      type="range"
                      min="-12"
                      max="12"
                      value="0"
                      step="0.5"
                      class="w-full"
                    />
                  </div>
                  <div class="text-center">
                    <label for="eqHigh" class="text-xs text-gray-400"
                      >Treble</label
                    >
                    <input
                      id="eqHigh"
                      type="range"
                      min="-12"
                      max="12"
                      value="0"
                      step="0.5"
                      class="w-full"
                    />
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Track Info and Controls -->
          <div class="flex-1 w-full">
            <div class="mb-4">
              <h2 id="title" class="text-2xl font-semibold">
                Alan Walker - Darkside
              </h2>
              <p id="artist" class="text-sm text-gray-400">Artist</p>
            </div>

            <!-- Progress -->
            <div class="mb-2">
              <div
                class="flex items-center justify-between text-xs text-gray-400 mb-1"
              >
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
              </div>
              <input
                id="progress"
                type="range"
                min="0"
                max="100"
                value="0"
                class="w-full h-2 bg-gray-700 rounded-lg accent-green-400"
              />
              <!-- Visualizer canvas -->
              <canvas
                id="visualizer"
                class="w-full mt-3 rounded-md"
                height="90"
              ></canvas>

              <!-- Lyrics display -->
              <div
                id="lyricsContainer"
                class="mt-4 p-0 rounded-md glass-card"
                style="max-height: 180px; overflow: hidden"
              >
                <div
                  class="flex items-center justify-between p-3 border-b border-white/6"
                >
                  <div class="text-sm font-semibold">Lyrics</div>
                  <div class="flex items-center gap-2">
                    <span id="lyricsStatus" class="text-xs text-gray-400"
                      >No lyrics loaded</span
                    >
                    <button
                      id="lyricOffsetMinus"
                      class="btn btn-ghost btn-xs"
                      title="Shift lyrics earlier"
                    >
                      -0.2s
                    </button>
                    <span id="lyricOffsetValue" class="text-xs text-green-300"
                      >0.0s</span
                    >
                    <button
                      id="lyricOffsetPlus"
                      class="btn btn-ghost btn-xs"
                      title="Shift lyrics later"
                    >
                      +0.2s
                    </button>
                    <button
                      id="saveOffsetBtn"
                      class="btn btn-ghost btn-xs"
                      title="Save offset"
                    >
                      Save
                    </button>
                    <button
                      id="autoTuneBtn"
                      class="btn btn-ghost btn-xs"
                      title="Auto-tune offset"
                    >
                      Auto-tune
                    </button>
                    <button id="toggleLyricsBtn" class="btn btn-ghost btn-sm">
                      Hide
                    </button>
                  </div>
                </div>
                <div
                  id="lyricsContent"
                  style="padding: 8px; max-height: 132px; overflow-y: auto"
                ></div>
              </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-center gap-6 mt-4">
              <button
                id="shuffleBtn"
                class="btn btn-ghost text-gray-300 text-xl"
                title="Shuffle"
              >
                <i class="fa-solid fa-shuffle"></i>
              </button>
              <button
                id="prevBtn"
                class="btn btn-ghost text-gray-300 text-2xl"
                title="Previous"
              >
                <i class="fa-solid fa-backward-step"></i>
              </button>

              <button
                id="playBtn"
                class="play-btn rounded-full w-16 h-16 flex items-center justify-center shadow-lg"
                title="Play/Pause"
              >
                <i id="playIcon" class="fa-solid fa-play"></i>
              </button>

              <!-- Like / Heart button -->
              <button
                id="likeBtn"
                class="btn btn-ghost text-2xl"
                title="Like this track"
              >
                <i id="likeIcon" class="fa-regular fa-heart"></i>
              </button>

              <button
                id="nextBtn"
                class="btn btn-ghost text-gray-300 text-2xl"
                title="Next"
              >
                <i class="fa-solid fa-forward-step"></i>
              </button>
              <button
                id="repeatBtn"
                class="btn btn-ghost text-gray-300 text-xl"
                title="Repeat"
              >
                <i class="fa-solid fa-repeat"></i>
              </button>
            </div>

            <!-- Equalizer controls -->
            <!-- EQ moved beside cover for desktop; if JS finds #eqContainerMobile it will be hidden on large screens -->
            <div class="hidden md:block" id="eqContainerDesktop">...</div>

            <!-- Volume (vertical, hidden until toggled) -->
            <div class="mt-6 relative">
              <div class="flex items-center gap-2">
                <button
                  id="volMinus"
                  class="btn btn-ghost text-gray-300"
                  title="Volume Down"
                >
                  <i class="fa-solid fa-minus"></i>
                </button>
                <button
                  id="volToggle"
                  class="btn btn-ghost text-gray-300"
                  title="Toggle Volume"
                >
                  <i class="fa-solid fa-volume-high"></i>
                </button>
                <button
                  id="volPlus"
                  class="btn btn-ghost text-gray-300"
                  title="Volume Up"
                >
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>

              <!-- vertical slider container; positioned absolute; hidden by default -->
              <div
                id="volumeWrap"
                class="absolute right-0 mt-2 w-12 p-2 rounded-lg border border-gray-800 bg-[#071015]/80 hidden"
              >
                <input
                  id="volume"
                  type="range"
                  min="0"
                  max="1"
                  step="0.01"
                  value="0.8"
                  class="vertical-slider"
                />
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Playlist -->
      <aside
        class="bg-gradient-to-br from-[#071015]/60 to-[#0f1519]/60 rounded-2xl p-4 backdrop-blur-md border border-gray-800 shadow-lg glass-card"
      >
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-lg font-semibold">Playlist</h3>
          <div class="flex items-center gap-2">
            <label
              for="uploadInput"
              class="btn btn-ghost text-sm cursor-pointer"
              title="Upload Your Music"
            >
              <i class="fa-solid fa-plus"></i>
            </label>
            <input
              id="uploadInput"
              type="file"
              accept="audio/*"
              multiple
              class="hidden"
            />
            <button
              id="aiToggle"
              class="btn btn-ghost text-sm"
              title="Toggle AI Recommendations"
            >
              AI Recs
            </button>
          </div>
        </div>
        <ul id="playlist" class="space-y-3 overflow-y-auto max-h-[60vh] pr-2">
          <!-- JS will populate playlist -->
        </ul>
      </aside>
    </main>

    <footer class="p-4 text-center text-xs text-gray-500">
      Built with Tailwind, DaisyUI and FontAwesome — Glassmorphism, responsive,
      and modern controls.
    </footer>

    <!-- Now Playing Stats (moved to bottom of page; non-fixed) -->
    <div
      id="nowStats"
      class="mt-6 p-3 text-center text-sm text-gray-200 bg-[#00000022] backdrop-blur-sm border-t border-white/6 glass-card"
      style="max-width: 1100px; margin: 0 auto"
    >
      Now Playing — Energy: 0% • Mood: Unknown
    </div>

    <!-- AI Analysis / Current Mood box (moved to bottom of page; non-fixed) -->
    <div
      id="aiAnalysis"
      class="mt-3 p-3 text-center text-sm text-gray-300 bg-[#00000022] backdrop-blur-sm border-t border-white/6 glass-card"
      style="max-width: 1100px; margin: 0 auto"
    >
      Analyzing...
    </div>

    <!-- ColorThief for extracting dominant colors from covers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
    <script src="app.js" defer></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/service-worker.js")
            .catch(() => {});
        });
      }
    </script>
  </body>
</html>
